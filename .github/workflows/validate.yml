name: Validate HTML

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install html5validator
        run: pip install html5validator

      - name: Validate HTML files
        run: |
          html5validator --root . \
            --ignore-re ".*\.(css|xml|txt|png|jpg|ico|json|yml|md)$" \
            --also-check-css \
            *.html
